services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume
      POSTGRES_DB: resume_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://resume:resume@postgres:5432/resume_analyzer
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: local-development-secret
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "8000:8000"
  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://resume:resume@postgres:5432/resume_analyzer
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
      - redis
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
