services:
  - type: web
    name: am-i-a-good-match-api
    runtime: docker
    repo: https://github.com/Charles-AM/Resume_Analyzer
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: NEXT_PUBLIC_API_URL
        value: /api/v1
      - key: EMBEDDING_PROVIDER
        value: local
      - key: LLM_PROVIDER
        value: local
